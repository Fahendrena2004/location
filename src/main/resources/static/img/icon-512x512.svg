<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6b800"/>
      <stop offset="100%" style="stop-color:#cca000"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#cca000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#cca000" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Car body -->
  <g transform="translate(256,280)" fill="url(#gold)" filter="url(#shadow)">
    <!-- Main body -->
    <path d="M-120,0 C-120,-20 -110,-28 -95,-28 L-70,-28 L-52,-72 C-48,-82 -38,-88 -28,-88 L28,-88 C38,-88 48,-82 52,-72 L70,-28 L95,-28 C110,-28 120,-20 120,0 L120,24 C120,32 112,40 104,40 L-104,40 C-112,40 -120,32 -120,24 Z"/>
    <!-- Windshield -->
    <path d="M-42,-72 L-24,-28 L24,-28 L42,-72 Z" fill="#2a3040" opacity="0.7"/>
    <!-- Front wheel -->
    <circle cx="-76" cy="40" r="24" fill="#2a3040"/>
    <circle cx="-76" cy="40" r="12" fill="url(#gold)" opacity="0.5"/>
    <circle cx="-76" cy="40" r="4" fill="#2a3040"/>
    <!-- Rear wheel -->
    <circle cx="76" cy="40" r="24" fill="#2a3040"/>
    <circle cx="76" cy="40" r="12" fill="url(#gold)" opacity="0.5"/>
    <circle cx="76" cy="40" r="4" fill="#2a3040"/>
    <!-- Headlight -->
    <rect x="-112" y="-10" width="18" height="10" rx="4" fill="#fff" opacity="0.9"/>
    <!-- Taillight -->
    <rect x="94" y="-10" width="18" height="10" rx="4" fill="#ff4444" opacity="0.8"/>
    <!-- Door handle -->
    <rect x="-8" y="-14" width="16" height="4" rx="2" fill="#2a3040" opacity="0.4"/>
  </g>
  <!-- Text "AutoRent" -->
  <text x="256" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="56" fill="url(#gold)" opacity="0.95">AutoRent</text>
  <!-- Tagline -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#cca000" opacity="0.5">Location de Voitures</text>
</svg>
