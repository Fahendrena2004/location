<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>Notifications - Location Voitures</title>
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="flex-grow-1 main-content-layout">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h2 class="fw-bold mb-1">Centre de Notifications</h2>
                        <p class="text-muted small mb-0">Retrouvez ici toutes vos alertes de réservation et de maintenance.</p>
                    </div>
                    <form th:action="@{/notifications/tout-lire}" method="post">
                        <button type="submit" class="btn btn-outline-primary px-4 py-2 rounded-pill fw-bold small">
                            Tout marquer comme lu
                        </button>
                    </form>
                </div>

            <div class="card border-0 shadow-sm" style="border-radius:12px; background-color: var(--bg-surface); border: 1px solid var(--border) !important;">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <div th:each="notif : ${notifications}" 
                             class="list-group-item list-group-item-action p-4 border-0 border-bottom"
                             th:classappend="${!notif.lu ? 'unread-notif' : ''}"
                             style="transition: background 0.2s; border-color: var(--border) !important; background-color: var(--bg-surface); color: var(--text-main);">
                            
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="d-flex gap-3">
                                    <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0 shadow-sm"
                                         th:classappend="${!notif.lu ? 'bg-danger text-white' : 'bg-secondary-subtle text-secondary'}"
                                         style="width: 48px; height: 48px;">
                                        <i class="bi bi-info-circle fs-4"></i>
                                    </div>
                                    <div>
                                        <div class="d-flex align-items-center gap-2 mb-1">
                                            <h6 class="fw-bold mb-0" th:text="${notif.titre}" style="color: var(--text-main);">Titre Notification</h6>
                                            <span th:if="${!notif.lu}" class="badge bg-danger rounded-3" style="font-size: 0.6rem;">Nouveau</span>
                                        </div>
                                        <p class="mb-2 small notif-desc-text" th:text="${notif.description}" style="color: var(--text-muted);">Description de la notification.</p>
                                        <div class="d-flex align-items-center gap-3">
                                            <span class="small" style="color: var(--text-light);">
                                                <i class="bi bi-clock me-1"></i>
                                                <span th:text="${#temporals.format(notif.dateCreation, 'dd/MM/yyyy HH:mm')}">Date</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <div class="dropdown d-inline-block">
                                        <button class="btn-action-square" type="button"
                                                th:id="'dropdownNotif' + ${notif.id}"
                                                data-bs-toggle="dropdown" aria-expanded="false">
                                            <i class="bi bi-three-dots-vertical text-secondary"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm"
                                            th:attr="aria-labelledby='dropdownNotif' + ${notif.id}"
                                            style="border-radius:10px; border:1px solid var(--border-color); min-width:180px; padding:6px;">
                                            <li th:if="${notif.url != null}">
                                                <a class="dropdown-item d-flex align-items-center gap-2 py-2"
                                                   th:href="@{'/notifications/lire/' + ${notif.id} + '?redirect=' + ${notif.url}}"
                                                   style="font-size:0.88rem;">
                                                    <i class="bi bi-eye text-primary"></i> Voir les détails
                                                </a>
                                            </li>
                                            <li sec:authorize="hasRole('CLIENT')" th:if="${notif.url != null and notif.url.startsWith('/locations/') and notif.titre == 'Réservation Confirmée'}">
                                                <a class="dropdown-item d-flex align-items-center gap-2 py-2 text-warning fw-bold"
                                                   th:href="@{'/notifications/lire/' + ${notif.id} + '?redirect=/paiements/resume/' + ${#strings.substringAfter(notif.url, '/locations/')}}"
                                                   style="font-size:0.88rem;">
                                                    <i class="bi bi-credit-card-fill"></i> Payer maintenant
                                                </a>
                                            </li>
                                            <li sec:authorize="hasRole('ADMIN')" th:if="${notif.url != null and notif.url.startsWith('/locations/') and notif.titre == 'Nouvelle Réservation'}">
                                                <form th:action="@{${notif.url} + '/approuver'}" method="post">
                                                    <button type="submit" class="dropdown-item d-flex align-items-center gap-2 py-2 text-primary fw-bold" style="font-size:0.88rem; background:transparent; border:none; width:100%; text-align:left;">
                                                        <i class="bi bi-check-circle-fill"></i> Approuver
                                                    </button>
                                                </form>
                                            </li>
                                            <li th:if="${!notif.lu}">
                                                <form th:action="@{'/notifications/lire/' + ${notif.id}}" method="get">
                                                    <button type="submit" class="dropdown-item d-flex align-items-center gap-2 py-2 text-success" style="font-size:0.88rem; background:transparent; border:none; width:100%; text-align:left;">
                                                        <i class="bi bi-check2-all"></i> Marquer comme lu
                                                    </button>
                                                </form>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5 text-muted">
                            <i class="bi bi-bell-slash display-1 opacity-25 mb-3"></i>
                            <p>Aucune notification pour le moment.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .list-group-item-action:hover { background-color: var(--bg-body) !important; }
        .bg-secondary-subtle { background-color: var(--bg-body) !important; }
        .unread-notif { background-color: var(--primary-soft) !important; }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.notif-desc-text').forEach(function(el) {
                var text = el.textContent;
                var regex = /([\d\s\u00A0]+(?:\.\d+)?)\s*(Ar|MGA)/g;
                if (regex.test(text)) {
                    el.innerHTML = text.replace(regex, function(match, p1) {
                        var numStr = p1.replace(/[\s\u00A0]/g, '');
                        return '<span class="amount-convertible fw-bold" data-mga="' + numStr + '">' + match + '</span>';
                    });
                }
            });
            // Re-trigger the formatting globally if script.js logic is already loaded
            if (typeof window.formatCurrency === 'function') {
                window.formatCurrency();
            }
        });
    </script>


        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
