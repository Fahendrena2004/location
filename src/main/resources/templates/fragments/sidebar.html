<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sidebar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <!-- Desktop Sidebar (Hidden on mobile) -->
    <div class="sidebar-main d-none d-lg-flex flex-column flex-shrink-0 shadow-sm">
        <div th:replace="~{fragments/sidebar :: sidebar-content}"></div>
    </div>

    <!-- Mobile Sidebar (Offcanvas) -->
    <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
        <div class="offcanvas-header border-bottom py-3">
            <p class="h5 mb-0 fw-bold text-primary" id="sidebarOffcanvasLabel">AUTORENT</p>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div th:replace="~{fragments/sidebar :: sidebar-content}"></div>
        </div>
    </div>
</div>

<!-- Sidebar Content Fragment (Separate to avoid duplication) -->
<div th:fragment="sidebar-content" class="sidebar-content-inner h-100 d-flex flex-column" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <!-- Logo Area -->
    <div class="sidebar-logo px-4 py-4 mb-2">
        <div class="d-flex align-items-center gap-3">
            <div class="logo-icon bg-primary rounded-3 text-white d-flex align-items-center justify-content-center" style="width: 42px; height: 42px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);">
                <i class="bi bi-car-front-fill fs-4"></i>
            </div>
            <div class="logo-text">
                <p class="h5 fw-bold mb-0 text-primary" style="letter-spacing: -0.5px;">AUTORENT</p>
                <div class="d-flex align-items-center gap-1">
                    <span class="rounded-circle bg-success" style="width: 6px; height: 6px;"></span>
                    <p class="small text-muted mb-0" style="font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;">Premium</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- User Context (Top) -->
    <div class="px-4 mb-4">
        <div class="bg-light-subtle rounded-4 p-3 border border-white border-opacity-10 d-flex align-items-center gap-3 shadow-sm">
             <div class="avatar-circle" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</div>
             <div class="overflow-hidden">
                <p class="small fw-bold mb-0 text-main text-truncate">[[${#authentication.name}]]</p>
                <p class="xx-small text-muted mb-0 text-uppercase fw-bold" style="font-size: 0.55rem; letter-spacing: 0.5px;">[[${#authentication.authorities[0]}]]</p>
             </div>
        </div>
    </div>

    <!-- Navigation Links -->
    <div class="flex-grow-1 overflow-y-auto px-2 custom-scrollbar">
        <div class="px-3 mb-2">
            <p class="text-uppercase text-muted fw-bold x-small mb-1 opacity-50 pe-none" style="font-size: 0.6rem; letter-spacing: 0.1rem;">Général</p>
        </div>
        
        <a href="/dashboard" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI == '/dashboard' ? 'active' : ''}">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Tableau de bord</span>
        </a>

        <a th:href="@{/profile}" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/profile') ? 'active' : ''}">
            <i class="bi bi-person-badge-fill"></i>
            <span>Mon Profil</span>
        </a>

        <a href="/notifications" class="sidebar-link d-flex align-items-center justify-content-between" th:classappend="${#httpServletRequest.requestURI.startsWith('/notifications') ? 'active' : ''}">
            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-bell-fill"></i>
                <span>Notifications</span>
            </div>
            <span th:if="${unreadNotificationsCount > 0}" class="badge bg-danger rounded-pill px-2" style="font-size: 0.6rem;" th:text="${unreadNotificationsCount}"></span>
        </a>

        <div class="px-3 mt-4 mb-2">
            <p class="text-uppercase text-muted fw-bold x-small mb-1 opacity-50 pe-none" style="font-size: 0.6rem; letter-spacing: 0.1rem;">Opérations</p>
        </div>
        
        <a href="/voitures" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/voitures') ? 'active' : ''}">
            <i class="bi bi-car-front-fill"></i>
            <span>Flotte Véhicules</span>
        </a>

        <a href="/locations" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/locations') and !#httpServletRequest.requestURI.contains('calendrier') ? 'active' : ''}">
            <i class="bi bi-calendar-check-fill"></i>
            <span>Réservations</span>
        </a>
        
        <a href="/locations/calendrier" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.contains('calendrier') ? 'active' : ''}">
            <i class="bi bi-calendar3-range-fill"></i>
            <span>Planning</span>
        </a>

        <a href="/paiements" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/paiements') ? 'active' : ''}">
            <i class="bi bi-credit-card-2-back-fill"></i>
            <span>Finances</span>
        </a>

        <a href="/factures" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/factures') ? 'active' : ''}">
            <i class="bi bi-file-earmark-pdf-fill"></i>
            <span>Facturation</span>
        </a>

        <!-- ADMIN SECTION -->
        <div sec:authorize="hasRole('ADMIN')">
            <div class="px-3 mt-4 mb-2">
                <p class="text-uppercase text-muted fw-bold x-small mb-1 opacity-50 pe-none" style="font-size: 0.6rem; letter-spacing: 0.1rem;">Administration</p>
            </div>
            
            <a href="/clients" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/clients') ? 'active' : ''}">
                <i class="bi bi-people-fill"></i>
                <span>Gestion Clients</span>
            </a>

            <a href="/entretien" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/entretien') ? 'active' : ''}">
                <i class="bi bi-tools"></i>
                <span>Maintenance</span>
            </a>

            <a href="/users" class="sidebar-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/users') ? 'active' : ''}">
                <i class="bi bi-shield-lock-fill"></i>
                <span>Accès & Sécurité</span>
            </a>
        </div>
    </div>

    <!-- Footer / User Area -->
    <div class="sidebar-footer mt-auto p-4 border-top bg-light-subtle">
         <!-- Premium Currency Toggle -->
         <div class="currency-glass p-1 mb-4">
            <div class="d-flex align-items-center">
                <button class="flex-grow-1 btn btn-sm rounded-pill currency-btn active-currency px-3" data-currency="MGA">MGA</button>
                <button class="flex-grow-1 btn btn-sm rounded-pill currency-btn px-3" data-currency="EUR">EUR</button>
            </div>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-logout w-100 d-flex align-items-center justify-content-between px-3 py-2 shadow-sm">
                <span class="small fw-bold">Se déconnecter</span>
                <i class="bi bi-power fs-5"></i>
            </button>
        </form>
    </div>
</div>
</div>

    <!-- Keep hidden scripts/styles for logic -->
    <script th:inline="javascript">
        // Keep theme/currency logic here if needed, or move to a separate JS file
    </script>
</div>
</html>
