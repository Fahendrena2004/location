<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>Nouveau Chauffeur - Location Voitures</title>
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="flex-grow-1 p-4" style="margin-left: 260px; min-height: 100vh;">
            <div class="page-container">
                <div class="d-flex align-items-center mb-5">
                    <a href="/chauffeurs" class="btn btn-light rounded-circle p-2 me-3 shadow-sm d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-arrow-left fs-5"></i>
                    </a>
                    <div>
                        <h2 class="fw-bold mb-1">Nouveau Chauffeur</h2>
                        <p class="text-muted small mb-0">Enregistrez un nouveau membre dans votre équipe de conduite</p>
                    </div>
                </div>

                <div class="card border-0 shadow-sm p-4 mb-5">
                    <form th:action="@{/chauffeurs/ajouter}" th:object="${chauffeur}" method="post">
                        <div class="row g-4">
                                <label for="prenom" class="form-label text-main fw-bold small text-uppercase mb-2">Prénom</label>
                                <input type="text" th:field="*{prenom}" id="prenom" 
                                       class="form-control py-2" 
                                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid' : ''"
                                       required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
                            </div>
                                <label for="nom" class="form-label text-main fw-bold small text-uppercase mb-2">Nom</label>
                                <input type="text" th:field="*{nom}" id="nom" 
                                       class="form-control py-2" 
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid' : ''"
                                       required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                            </div>

                                <label for="telephone" class="form-label text-main fw-bold small text-uppercase mb-2">Téléphone</label>
                                <input type="tel" th:field="*{telephone}" id="telephone" 
                                       class="form-control py-2" 
                                       th:classappend="${#fields.hasErrors('telephone')} ? 'is-invalid' : ''"
                                       required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></div>
                            </div>
                                <label for="numeroPermis" class="form-label text-main fw-bold small text-uppercase mb-2">N° Permis de conduire</label>
                                <input type="text" th:field="*{numeroPermis}" id="numeroPermis" 
                                       class="form-control py-2" 
                                       th:classappend="${#fields.hasErrors('numeroPermis')} ? 'is-invalid' : ''"
                                       required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('numeroPermis')}" th:errors="*{numeroPermis}"></div>
                            </div>
                            
                            <div class="col-md-12 text-start" th:if="${#fields.hasAnyErrors()}">
                                <div class="alert alert-danger border-0 rounded-3 small">
                                    Veuillez corriger les erreurs ci-dessous.
                                </div>
                            </div>

                            <div class="col-12 mt-4">
                                <div class="bg-light p-4 rounded-3 border">
                                    <div class="form-check form-switch custom-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{disponible}" id="disponible" checked>
                                        <label class="form-check-label fw-bold small text-uppercase text-main ms-2" for="disponible">
                                            Chauffeur disponible immédiatement
                                        </label>
                                    </div>
                                    <p class="text-muted small mb-0 mt-2 ms-5">Si activé, ce chauffeur pourra être assigné à de nouvelles locations dès son enregistrement.</p>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end align-items-center gap-3 mt-5">
                            <a href="/chauffeurs" class="btn btn-light px-4">Annuler</a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                <i class="bi bi-person-check me-2"></i> Enregistrer le chauffeur
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <style>
        .custom-switch .form-check-input { width: 3em; height: 1.5em; cursor: pointer; }
        .custom-switch .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
        .text-start { text-align: left !important; }
    </style>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
