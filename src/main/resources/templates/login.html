<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Location Voitures Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-soft: #f8fafc;
            --main-dark: #0f172a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 480px;
            transition: transform 0.3s ease;
        }
        .brand-logo {
            width: 70px;
            height: 70px;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2.2rem;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .form-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        .input-group-text {
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            border-right: none;
            border-radius: 12px 0 0 12px;
            padding-left: 20px;
            color: #94a3b8;
        }
        .has-icon {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }
        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
            color: white;
        }
        .auth-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .auth-link:hover { opacity: 0.8; }
        .alert {
            border-radius: 16px;
            border: none;
            padding: 15px 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container d-flex flex-column align-items-center">
        <div class="login-card">
            <div class="text-center">
                <div class="brand-logo">
                    <i class="bi bi-car-front-fill"></i>
                </div>
                <h2 class="fw-bold text-dark mb-2" style="font-family: 'Outfit', sans-serif;">Gérez votre Flotte</h2>
                <p class="text-muted small mb-5">Connectez-vous à votre espace administration premium</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger mb-4 d-flex align-items-center shadow-sm">
                <i class="bi bi-shield-lock-fill fs-4 me-3"></i>
                <div>
                    <strong class="d-block">Accès refusé</strong>
                    <span class="small opacity-75">Email ou secret incorrect.</span>
                </div>
            </div>
            
            <div th:if="${param.logout}" class="alert alert-info mb-4 d-flex align-items-center shadow-sm">
                <i class="bi bi-info-circle-fill fs-4 me-3 text-primary"></i>
                <div>
                    <strong class="d-block">Session close</strong>
                    <span class="small opacity-75">Vous avez été déconnecté avec succès.</span>
                </div>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-4">
                    <label for="username" class="form-label">Identifiant Administrateur</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="email" class="form-control has-icon" id="username" name="username" placeholder="votre@email.com" required autofocus>
                    </div>
                </div>
                
                <div class="mb-5">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="password" class="form-label mb-0">Code d'accès</label>
                        <a th:href="@{/forgot-password}" class="auth-link smaller" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Oubli ?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control has-icon" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login mb-4">
                    Connexion sécurisée <i class="bi bi-chevron-right ms-2 small"></i>
                </button>
            </form>

            <div class="text-center pt-3 border-top mt-2">
                <p class="text-muted small mb-0">Nouvel administrateur ? 
                    <a th:href="@{/register}" class="auth-link">Rejoindre la plateforme</a>
                </p>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <p class="text-muted small fw-medium opacity-50">&copy; 2026 Modern Rental Dynamics &bull; Enterprise Edition</p>
        </div>
    </div>
</body>
</html></body>
</html>
