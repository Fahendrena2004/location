<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - Location Voitures Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --bg-soft: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 50px 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 50px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 650px;
        }
        .brand-logo {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .form-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        .btn-register {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            background: #1d4ed8;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
            color: white;
        }
        .smaller { font-size: 0.75rem; }
        .auth-link { color: var(--primary); font-weight: 700; text-decoration: none; }
        .alert { border-radius: 16px; border: none; padding: 15px 20px; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="text-center mb-5">
            <div class="brand-logo">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h2 class="fw-bold text-dark mb-1" style="font-family: 'Outfit', sans-serif;">Rejoindre l'Équipe</h2>
            <p class="text-muted small">Créez votre profil administrateur premium</p>
        </div>

        <div th:if="${error}" class="alert alert-danger mb-4 d-flex align-items-center shadow-sm">
            <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
            <div>
                <strong class="d-block">Oups !</strong>
                <span class="small opacity-75" th:text="${error}">Vérifiez vos informations.</span>
            </div>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="row g-4 mb-4">
                <div class="col-md-6 text-start">
                    <label for="prenom" class="form-label">Prénom</label>
                    <input type="text" class="form-control" id="prenom" name="prenom" 
                           placeholder="Ex: Jean" pattern="^[a-zA-ZÀ-ÿ\s\'-]+$" 
                           title="Lettres, espaces, tirets et apostrophes uniquement" required>
                </div>
                <div class="col-md-6 text-start">
                    <label for="nom" class="form-label">Nom de famille</label>
                    <input type="text" class="form-control" id="nom" name="nom" 
                           placeholder="Ex: Rakoto" pattern="^[a-zA-ZÀ-ÿ\s\'-]+$" 
                           title="Lettres, espaces, tirets et apostrophes uniquement" required>
                </div>
            </div>
            
            <div class="row g-4 mb-4">
                <div class="col-md-7 text-start">
                    <label for="email" class="form-label">Adresse professionnelle</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="admin@premium.mg" required>
                </div>
                <div class="col-md-5 text-start">
                    <label for="telephone" class="form-label">Ligne directe</label>
                    <input type="text" class="form-control" id="telephone" name="telephone" 
                           placeholder="034 XX XXX XX" pattern="^[0-9\s\+.-]+$" 
                           title="Chiffres, espaces, +, . et - uniquement" required>
                </div>
            </div>
            
            <div class="row g-4 mb-5">
                <div class="col-md-6 text-start">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="••••••••" minlength="6" required>
                </div>
                <div class="col-md-6 text-start">
                    <label for="confirmPassword" class="form-label">Confirmer le code</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                           placeholder="••••••••" minlength="6" required>
                </div>
            </div>

            <button type="submit" class="btn btn-register mb-4">
                Créer l'accès administrateur <i class="bi bi-check-circle ms-2 small"></i>
            </button>
        </form>
        
        <div class="text-center pt-3 border-top">
            <p class="text-muted small mb-0">Vous possédez déjà un accès ? 
                <a th:href="@{/login}" class="auth-link">Se connecter ici</a>
            </p>
        </div>
    </div>
</body>
</html>
</body>
</html>
