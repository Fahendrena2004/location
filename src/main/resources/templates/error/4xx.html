<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - Location Voitures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fefaf3; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card {  border-radius: 24px; padding: 48px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid #fdf5e6; max-width: 500px; text-align: center; }
        .error-icon { font-size: 5rem; color: #6b7280; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <h2 class="fw-bold mb-3">Une erreur est survenue</h2>
        <p class="text-muted mb-4">Désolé, une erreur inattendue s'est produite. Si le problème persiste, veuillez contacter l'administrateur.</p>
        <a href="/" class="btn btn-primary px-5 rounded-pill fw-bold" style="background:#2563eb; border:none;">Retour à l'Accueil</a>
    </div>
</body>
</html>
