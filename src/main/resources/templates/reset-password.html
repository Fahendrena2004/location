<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - Location Voitures Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --success-color: #10b981;
            --success-hover: #059669;
            --bg-soft: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .reset-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 50px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 480px;
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background: #ecfdf5;
            color: var(--success-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2.2rem;
        }
        .form-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--success-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }
        .btn-reset {
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        .btn-reset:hover {
            background: var(--success-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="reset-card text-center">
        <div class="icon-circle">
            <i class="bi bi-key-fill"></i>
        </div>
        <h2 class="fw-bold text-dark mb-2" style="font-family: 'Outfit', sans-serif;">Nouveau Code</h2>
        <p class="text-muted small mb-5">Définissez vos nouveaux identifiants de sécurité pour reprendre la main.</p>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="mb-5 text-start">
                <label for="password" class="form-label">Nouveau mot de passe</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit" class="btn btn-reset">
                Valider et reconnecter <i class="bi bi-check-lg ms-2"></i>
            </button>
        </form>
    </div>
</body>
</html>
</html>
