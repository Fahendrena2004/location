<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Location Voitures Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-soft: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .forgot-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 50px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 480px;
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2.2rem;
        }
        .form-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }
        .btn-send:hover {
            background: #1d4ed8;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
            color: white;
        }
        .auth-link { color: var(--primary); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="text-center mb-5">
            <div class="icon-circle">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2 class="fw-bold text-dark mb-2" style="font-family: 'Outfit', sans-serif;">Accès Perdu ?</h2>
            <p class="text-muted small">Renseignez votre email professionnel pour réinitialiser vos identifiants.</p>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-4 text-start">
                <label for="email" class="form-label">Email Administrateur</label>
                <div class="position-relative">
                    <input type="email" class="form-control" id="email" name="email" placeholder="admin@premium.mg" required autofocus>
                </div>
            </div>
            <button type="submit" class="btn btn-send mb-4">
                Envoyer les instructions <i class="bi bi-send-fill ms-2 small"></i>
            </button>
        </form>

        <div class="text-center pt-3 border-top mt-2">
            <a th:href="@{/login}" class="auth-link small">
                <i class="bi bi-arrow-left me-2"></i> Retour à la page de connexion
            </a>
        </div>
    </div>
</body>
</html>
</html>
