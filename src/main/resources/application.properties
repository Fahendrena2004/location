    # Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/location_voiture_db
spring.datasource.username=postgres
spring.datasource.password=fafana
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Server
server.port=8080
server.servlet.context-path=/

# Thymeleaf
spring.thymeleaf.cache=false

# SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp

# App Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Stripe API - value comes from application-local.properties (gitignored) or env var
stripe.api.key=${STRIPE_SECRET_KEY}

# Load local overrides if present (this file is gitignored)
spring.config.import=optional:file:./application-local.properties
